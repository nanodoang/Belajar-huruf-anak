<title>Kiki Belajar Huruf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#BFE7FF;
    --sky-bottom:#EAF6FF;
    --ink:#1F3B57;
    --ink-soft:#4A6580;
    --sun:#FFC93C;
    --sun-deep:#F3A712;
    --coral:#FF6B57;
    --coral-deep:#E4503C;
    --leaf:#4CAF7D;
    --leaf-deep:#379563;
    --card:#FFFFFF;
    --paper:#FFF8EA;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Nunito',sans-serif;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 55%,#F5FBEF 100%);
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:18px 14px 30px;
  }
  .clouds{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .cloud{position:absolute;background:#fff;border-radius:50%;opacity:.7;filter:blur(1px);}
  .cloud.c1{width:120px;height:44px;top:6%;left:-10%;animation:drift 48s linear infinite;}
  .cloud.c2{width:80px;height:32px;top:16%;left:-20%;animation:drift 65s linear infinite;animation-delay:-20s;}
  .cloud.c3{width:100px;height:38px;top:3%;left:-30%;animation:drift 55s linear infinite;animation-delay:-8s;}
  @keyframes drift{from{transform:translateX(0);}to{transform:translateX(140vw);}}

  .wrap{position:relative;z-index:1;width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;gap:14px;}

  header{width:100%;display:flex;align-items:center;gap:12px;}
  .mascot{
    width:64px;height:64px;flex:none;border-radius:50%;
    background:var(--leaf);
    display:flex;align-items:center;justify-content:center;
    font-size:34px;
    box-shadow:0 6px 0 var(--leaf-deep), 0 10px 16px rgba(55,149,99,.25);
    transition:transform .18s ease;
  }
  .mascot.talk{animation:bob .5s ease infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-6px) rotate(-4deg);}}
  .speech-bubble{
    flex:1;
    background:var(--card);
    border-radius:16px;
    padding:10px 14px;
    font-family:'Baloo 2',sans-serif;
    font-weight:600;
    font-size:15px;
    color:var(--ink);
    box-shadow:0 4px 0 rgba(31,59,87,.08), 0 2px 10px rgba(31,59,87,.08);
    position:relative;
    min-height:24px;
    display:flex;align-items:center;
  }
  .speech-bubble:before{
    content:"";position:absolute;left:-8px;top:22px;
    border:8px solid transparent;border-right-color:var(--card);
  }

  .title{
    font-family:'Baloo 2',sans-serif;font-weight:800;font-size:15px;
    color:var(--ink-soft);letter-spacing:.5px;text-transform:uppercase;
    opacity:.75;margin-top:2px;
  }

  .stage{
    width:100%;
    background:var(--paper);
    border-radius:28px;
    padding:22px 18px 20px;
    box-shadow:0 8px 0 rgba(31,59,87,.10), 0 16px 30px rgba(31,59,87,.12);
    display:flex;flex-direction:column;align-items:center;gap:10px;
    position:relative;
    border:3px solid #fff;
  }

  .letter-card{
    width:180px;height:180px;border-radius:26px;
    background:var(--card);
    display:flex;align-items:center;justify-content:center;
    font-family:'Baloo 2',sans-serif;font-weight:800;
    font-size:108px;line-height:1;color:var(--coral);
    box-shadow:0 6px 0 rgba(31,59,87,.08), inset 0 0 0 6px #FFF3E0;
    transition:transform .18s ease, color .2s ease;
    user-select:none;
  }
  .letter-card.correct{color:var(--leaf);animation:pop .5s ease;}
  .letter-card.wrong{animation:shake .4s ease;}
  @keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.14);}100%{transform:scale(1);}}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

  .example{
    display:flex;align-items:center;gap:8px;
    font-family:'Baloo 2',sans-serif;font-weight:700;font-size:16px;
    color:var(--ink-soft);
  }
  .example .emoji{font-size:26px;}

  .mic-btn{
    margin-top:6px;
    width:88px;height:88px;border-radius:50%;
    border:none;cursor:pointer;
    background:var(--coral);
    box-shadow:0 6px 0 var(--coral-deep), 0 10px 18px rgba(228,80,60,.3);
    display:flex;align-items:center;justify-content:center;
    font-size:38px;
    color:#fff;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .mic-btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--coral-deep), 0 4px 10px rgba(228,80,60,.3);}
  .mic-btn.listening{
    background:var(--sun);
    box-shadow:0 6px 0 var(--sun-deep), 0 10px 18px rgba(243,167,18,.35);
    animation:pulse 1s ease infinite;
  }
  @keyframes pulse{0%{box-shadow:0 6px 0 var(--sun-deep),0 0 0 0 rgba(255,201,60,.6);}70%{box-shadow:0 6px 0 var(--sun-deep),0 0 0 18px rgba(255,201,60,0);}100%{box-shadow:0 6px 0 var(--sun-deep),0 0 0 0 rgba(255,201,60,0);}}

  .mic-label{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:13px;color:var(--ink-soft);margin-top:2px;min-height:18px;}

  .feedback{
    min-height:30px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:17px;
    text-align:center;
  }
  .feedback.ok{color:var(--leaf-deep);}
  .feedback.no{color:var(--coral-deep);}

  .controls{display:flex;gap:10px;width:100%;justify-content:center;}
  .nav-btn{
    flex:1;max-width:130px;
    padding:10px 0;border-radius:14px;border:none;cursor:pointer;
    font-family:'Baloo 2',sans-serif;font-weight:700;font-size:14px;
    background:#fff;color:var(--ink-soft);
    box-shadow:0 4px 0 rgba(31,59,87,.08);
  }
  .nav-btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(31,59,87,.08);}

  .trail{
    width:100%;display:flex;gap:8px;overflow-x:auto;
    padding:6px 4px 10px;scrollbar-width:none;
  }
  .trail::-webkit-scrollbar{display:none;}
  .step{
    flex:none;width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Baloo 2',sans-serif;font-weight:700;font-size:15px;
    background:#fff;color:var(--ink-soft);
    border:2px solid #E3ECF4;cursor:pointer;
    transition:all .15s ease;
  }
  .step.current{border-color:var(--coral);color:var(--coral);background:#FFF0EE;transform:scale(1.08);}
  .step.done{background:var(--leaf);border-color:var(--leaf-deep);color:#fff;}

  .progress-line{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:13px;color:var(--ink-soft);}

  .unsupported{
    background:#FFF3E0;border-radius:16px;padding:14px 16px;font-size:14px;
    color:var(--ink-soft);text-align:center;line-height:1.5;
  }

  .confetti{position:fixed;inset:0;pointer-events:none;z-index:5;}
  .confetti span{
    position:absolute;top:-20px;font-size:20px;
    animation:fall linear forwards;
  }
  @keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:.9;}}

  .manual-ok-btn{
    font-family:'Baloo 2',sans-serif;font-weight:700;font-size:13px;
    background:#fff;color:var(--leaf-deep);border:2px solid var(--leaf);
    border-radius:12px;padding:8px 14px;cursor:pointer;margin-top:4px;
  }
  .manual-ok-btn:active{transform:translateY(2px);}

  .install-btn{
    font-family:'Baloo 2',sans-serif;font-weight:700;font-size:14px;
    background:var(--leaf);color:#fff;border:none;border-radius:14px;
    padding:11px 20px;cursor:pointer;
    box-shadow:0 4px 0 var(--leaf-deep);
  }
  .install-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--leaf-deep);}
  .ios-hint{
    font-size:13px;color:var(--ink-soft);text-align:center;
    background:#fff;border-radius:14px;padding:10px 14px;line-height:1.5;
    max-width:320px;
  }

  @media (max-width:360px){
    .letter-card{width:150px;height:150px;font-size:90px;}
    .mic-btn{width:76px;height:76px;font-size:32px;}
  }
</style>
</head>
<body>

<div class="clouds">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
</div>

<div class="wrap">
  <header>
    <div class="mascot" id="mascot">🦜</div>
    <div class="speech-bubble" id="bubble">Halo! Aku Kiki. Ayo belajar huruf sama-sama!</div>
  </header>
  <div class="title">Kiki Belajar Huruf — Ucapkan Bunyinya</div>

  <div class="stage">
    <div class="letter-card" id="letterCard">A</div>
    <div class="example" id="example"><span class="emoji">🍎</span><span id="exampleWord">Apel</span></div>

    <div id="micArea">
      <button class="mic-btn" id="micBtn" aria-label="Rekam suara">🎤</button>
    </div>
    <div class="mic-label" id="micLabel">Tekan mikrofon, lalu ucapkan bunyi hurufnya</div>
    <div class="feedback" id="feedback"></div>
    <button class="manual-ok-btn" id="manualOkBtn" style="display:none;">✅ Sudah Benar, Lanjut</button>

    <div class="controls">
      <button class="nav-btn" id="prevBtn">⬅ Sebelumnya</button>
      <button class="nav-btn" id="skipBtn">Lewati ➡</button>
    </div>
  </div>

  <div class="progress-line" id="progressLine">0 dari 26 huruf dikuasai</div>
  <div class="trail" id="trail"></div>

  <button class="install-btn" id="installBtn" style="display:none;">📲 Pasang di HP</button>
  <div class="ios-hint" id="iosHint" style="display:none;">Buka menu <strong>Bagikan</strong> di Safari, lalu pilih <strong>Tambah ke Layar Utama</strong> untuk memasang aplikasi ini.</div>
</div>

<div class="confetti" id="confetti"></div>

<script>
(function(){
  const DATA = [
    ["A","Apel","🍎",["a","apel"]],
    ["B","Bola","⚽",["be","beh","b","bola"]],
    ["C","Cicak","🦎",["ce","seh","c","cicak"]],
    ["D","Dadu","🎲",["de","deh","d","dadu"]],
    ["E","Ember","🪣",["e","ember"]],
    ["F","Foto","📷",["ef","eff","f","foto"]],
    ["G","Gajah","🐘",["ge","geh","g","gajah"]],
    ["H","Hujan","🌧️",["ha","haa","h","hujan"]],
    ["I","Ikan","🐟",["i","ikan"]],
    ["J","Jam","⏰",["je","jeh","j","jam"]],
    ["K","Kucing","🐱",["ka","kaa","k","kucing"]],
    ["L","Lampu","💡",["el","ell","l","lampu"]],
    ["M","Meja","🪑",["em","emm","m","meja"]],
    ["N","Naga","🐉",["en","enn","n","naga"]],
    ["O","Obat","💊",["o","obat"]],
    ["P","Pisang","🍌",["pe","peh","p","pisang"]],
    ["Q","Qori","📖",["ki","qi","q","qori"]],
    ["R","Rumah","🏠",["er","err","r","rumah"]],
    ["S","Sapi","🐄",["es","ess","s","sapi"]],
    ["T","Topi","🎩",["te","teh","t","topi"]],
    ["U","Ular","🐍",["u","ular"]],
    ["V","Vas","🏺",["ve","vee","fe","v","vas"]],
    ["W","Wortel","🥕",["we","weh","w","wortel"]],
    ["X","Xilofon","🎹",["eks","ex","x","xilofon"]],
    ["Y","Yoyo","🪀",["ye","yeh","y","yoyo"]],
    ["Z","Zebra","🦓",["zet","zed","set","z","zebra"]]
  ];

  let idx = 0;
  const solved = new Array(DATA.length).fill(false);

  const letterCard = document.getElementById('letterCard');
  const exampleWord = document.getElementById('exampleWord');
  const exampleEmoji = document.querySelector('.example .emoji');
  const micBtn = document.getElementById('micBtn');
  const micLabel = document.getElementById('micLabel');
  const feedback = document.getElementById('feedback');
  const bubble = document.getElementById('bubble');
  const mascot = document.getElementById('mascot');
  const trail = document.getElementById('trail');
  const progressLine = document.getElementById('progressLine');
  const prevBtn = document.getElementById('prevBtn');
  const skipBtn = document.getElementById('skipBtn');
  const confettiBox = document.getElementById('confetti');

  function buildTrail(){
    trail.innerHTML = '';
    DATA.forEach((d,i)=>{
      const el = document.createElement('div');
      el.className = 'step' + (i===idx?' current':'') + (solved[i]?' done':'');
      el.textContent = d[0];
      el.addEventListener('click', ()=>{ idx = i; render(); });
      trail.appendChild(el);
    });
  }

  function updateProgress(){
    const count = solved.filter(Boolean).length;
    progressLine.textContent = count + ' dari ' + DATA.length + ' huruf dikuasai';
  }

  function render(){
    const [letter, word, emoji] = DATA[idx];
    letterCard.textContent = letter;
    letterCard.classList.remove('correct','wrong');
    exampleWord.textContent = word;
    exampleEmoji.textContent = emoji;
    feedback.textContent = '';
    feedback.className = 'feedback';
    bubble.textContent = 'Coba ucapkan bunyi huruf "' + letter + '" ya!';
    failCount = 0;
    manualOkBtn.style.display = 'none';
    buildTrail();
    updateProgress();
  }

  function launchConfetti(){
    const icons = ['🎉','⭐','✨','🎈'];
    for(let i=0;i<14;i++){
      const s = document.createElement('span');
      s.textContent = icons[Math.floor(Math.random()*icons.length)];
      s.style.left = Math.random()*100 + 'vw';
      s.style.animationDuration = (1.6 + Math.random()*1.2) + 's';
      s.style.fontSize = (16 + Math.random()*14) + 'px';
      confettiBox.appendChild(s);
      setTimeout(()=>s.remove(), 3000);
    }
  }

  function goNext(){
    if(idx < DATA.length - 1){
      idx++;
    } else {
      idx = 0;
    }
    render();
  }

  prevBtn.addEventListener('click', ()=>{
    idx = (idx - 1 + DATA.length) % DATA.length;
    render();
  });
  skipBtn.addEventListener('click', goNext);

  // Speech recognition setup
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognizing = false;
  let recognition = null;

  function normalize(s){
    return s.toLowerCase().trim().replace(/[.,!?]/g,'');
  }

  if(SpeechRecognition){
    recognition = new SpeechRecognition();
    recognition.lang = 'id-ID';
    recognition.interimResults = false;
    recognition.maxAlternatives = 5;

    recognition.onstart = function(){
      recognizing = true;
      micBtn.classList.add('listening');
      micLabel.textContent = 'Kiki sedang mendengarkan...';
      mascot.classList.add('talk');
    };

    recognition.onend = function(){
      recognizing = false;
      micBtn.classList.remove('listening');
      mascot.classList.remove('talk');
      if(micLabel.textContent === 'Kiki sedang mendengarkan...'){
        micLabel.textContent = 'Tekan mikrofon, lalu ucapkan bunyi hurufnya';
      }
    };

    recognition.onerror = function(e){
      recognizing = false;
      micBtn.classList.remove('listening');
      mascot.classList.remove('talk');
      if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
        micLabel.textContent = 'Izin mikrofon ditolak. Aktifkan izin mikrofon di browser.';
      } else if(e.error === 'no-speech'){
        micLabel.textContent = 'Tidak terdengar suara, coba lagi ya';
      } else {
        micLabel.textContent = 'Tekan mikrofon, lalu ucapkan bunyi hurufnya';
      }
    };

    recognition.onresult = function(event){
      const results = event.results[0];
      const heard = [];
      for(let i=0;i<results.length;i++){
        heard.push(normalize(results[i].transcript));
      }
      checkAnswer(heard);
    };

    micBtn.addEventListener('click', function(){
      if(recognizing){
        recognition.stop();
        return;
      }
      feedback.textContent = '';
      feedback.className = 'feedback';
      try{ recognition.start(); } catch(e){}
    });
  } else {
    micBtn.disabled = true;
    micBtn.style.opacity = '0.5';
    const warn = document.createElement('div');
    warn.className = 'unsupported';
    warn.textContent = 'Pengenalan suara belum didukung di browser ini. Gunakan Google Chrome untuk mencoba fitur suara.';
    document.getElementById('micArea').after(warn);
    micLabel.textContent = '';
  }

  const manualOkBtn = document.getElementById('manualOkBtn');
  let failCount = 0;

  function levenshtein(a, b){
    const m = a.length, n = b.length;
    if(m === 0) return n;
    if(n === 0) return m;
    const dp = Array.from({length:m+1}, ()=>new Array(n+1).fill(0));
    for(let i=0;i<=m;i++) dp[i][0] = i;
    for(let j=0;j<=n;j++) dp[0][j] = j;
    for(let i=1;i<=m;i++){
      for(let j=1;j<=n;j++){
        const cost = a[i-1] === b[j-1] ? 0 : 1;
        dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);
      }
    }
    return dp[m][n];
  }

  function fuzzyMatch(h, a){
    if(!h || !a) return false;
    if(h === a || h.includes(a) || a.includes(h)) return true;
    if(h[0] !== a[0]) return false; // bunyi awal harus mirip, tapi ini longgar untuk sisanya
    const maxLen = Math.max(h.length, a.length);
    const dist = levenshtein(h, a);
    const threshold = maxLen <= 3 ? 1 : maxLen <= 6 ? 2 : 3;
    return dist <= threshold;
  }

  function checkAnswer(heardList){
    const [letter, , , accepted] = DATA[idx];
    const isCorrect = heardList.some(h => {
      if(!h) return false;
      if(accepted.includes(h) || h === letter.toLowerCase()) return true;
      return accepted.some(a => fuzzyMatch(h, a));
    });
    if(isCorrect){
      failCount = 0;
      manualOkBtn.style.display = 'none';
      solved[idx] = true;
      letterCard.classList.add('correct');
      feedback.textContent = 'Betul sekali! 🎉';
      feedback.className = 'feedback ok';
      bubble.textContent = 'Hebat! Huruf ' + letter + ' benar!';
      launchConfetti();
      buildTrail();
      updateProgress();
      setTimeout(goNext, 1400);
    } else {
      failCount++;
      letterCard.classList.add('wrong');
      setTimeout(()=>letterCard.classList.remove('wrong'), 400);
      feedback.textContent = 'Kiki dengar "' + (heardList[0]||'...') + '". Coba lagi ya!';
      feedback.className = 'feedback no';
      bubble.textContent = 'Ayo coba sekali lagi, ucapkan bunyi huruf ' + letter;
      if(failCount >= 2){
        manualOkBtn.style.display = 'inline-block';
      }
    }
  }

  manualOkBtn.addEventListener('click', function(){
    const [letter] = DATA[idx];
    failCount = 0;
    manualOkBtn.style.display = 'none';
    solved[idx] = true;
    letterCard.classList.add('correct');
    feedback.textContent = 'Oke, lanjut ya! 🎉';
    feedback.className = 'feedback ok';
    bubble.textContent = 'Sip, huruf ' + letter + ' dilanjut!';
    launchConfetti();
    buildTrail();
    updateProgress();
    setTimeout(goNext, 1000);
  });

  render();

  // --- Pasang ke layar utama HP ---
  const installBtn = document.getElementById('installBtn');
  const iosHint = document.getElementById('iosHint');
  let deferredPrompt = null;
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  const isIOS = /iphone|ipad|ipod/i.test(window.navigator.userAgent);

  if(!isStandalone){
    window.addEventListener('beforeinstallprompt', function(e){
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'inline-block';
    });
    installBtn.addEventListener('click', async function(){
      if(!deferredPrompt) return;
      installBtn.style.display = 'none';
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    });
    window.addEventListener('appinstalled', function(){
      installBtn.style.display = 'none';
      iosHint.style.display = 'none';
    });
    if(isIOS){
      iosHint.style.display = 'block';
    }
  }

  // --- Service worker sederhana agar bisa dibuka lagi tanpa internet ---
  if('serviceWorker' in navigator){
    const swCode = `
      const CACHE_NAME = 'kiki-huruf-v1';
      self.addEventListener('install', function(event){
        event.waitUntil(
          caches.open(CACHE_NAME).then(function(cache){
            return cache.add(self.registration.scope);
          })
        );
        self.skipWaiting();
      });
      self.addEventListener('activate', function(event){ self.clients.claim(); });
      self.addEventListener('fetch', function(event){
        event.respondWith(
          caches.match(event.request).then(function(cached){
            return cached || fetch(event.request).then(function(response){
              return caches.open(CACHE_NAME).then(function(cache){
                cache.put(event.request, response.clone());
                return response;
              });
            }).catch(function(){ return cached; });
          })
        );
      });
    `;
    const swBlob = new Blob([swCode], {type:'application/javascript'});
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl, {scope: './'}).catch(function(){});
  }
})();
</script>
</body>
</html>
